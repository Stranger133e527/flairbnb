name: Sync warehouse

on:
  schedule:
    # Daily 03:00 UTC (~08:30 IST)
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      stage:
        description: "Pipeline stage"
        required: true
        default: all
        type: choice
        options:
          - all
          - seed
          - discover
          - enrich
          - metrics
      markets:
        description: "Market ids (comma-separated) or all"
        required: false
        default: all
      max_listings:
        description: "Discover cap per market (0 = full pagination, slow)"
        required: false
        default: "50"
      workers:
        description: "Parallel enrich workers"
        required: false
        default: "5"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e .

      - name: Sync
        env:
          motherduck_token: ${{ secrets.MOTHERDUCK_TOKEN }}
          MOTHERDUCK_DATABASE: flairbnb
          FLAIRBNB_CURRENCY: INR
          FLAIRBNB_LANGUAGE: en
          FLAIRBNB_PROXY_URL: ${{ secrets.FLAIRBNB_PROXY_URL }}
          SCRAPE_DELAY_MS: "150"
          # Keep daily runs bounded so they finish in a reasonable time
          SYNC_MAX_LISTINGS_PER_MARKET: ${{ github.event.inputs.max_listings || '50' }}
          SYNC_DETAILS_REFRESH_LIMIT: "20"
          SYNC_CALENDAR_REFRESH_LIMIT: "20"
          SYNC_ENRICH_WORKERS: ${{ github.event.inputs.workers || '5' }}
        run: |
          STAGE="${{ github.event.inputs.stage || 'all' }}"
          MARKETS="${{ github.event.inputs.markets || 'all' }}"
          WORKERS="${{ github.event.inputs.workers || '5' }}"
          MAX="${{ github.event.inputs.max_listings || '50' }}"
          python -m flairbnb.pipeline.sync \
            --stage "$STAGE" \
            --markets "$MARKETS" \
            --max-listings "$MAX" \
            --workers "$WORKERS"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sync-failure-logs
          path: |
            *.log
            data/
          if-no-files-found: ignore
