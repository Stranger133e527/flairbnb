[project]
name = "flairbnb"
version = "0.1.0"
description = "Flairbnb backend — Airbnb data via pyairbnb"
requires-python = ">=3.10"
dependencies = [
  "curl_cffi",
  "bs4",
  "requests",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
